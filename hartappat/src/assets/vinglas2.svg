<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <!-- Glas-gradient -->
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#dfe6ee" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Vin-gradient -->
    <linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff3355"/>
      <stop offset="100%" stop-color="#7a001f"/>
    </linearGradient>

    <!-- Highlight -->
    <linearGradient id="highlight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <g transform="rotate(10 32 32)">

    <!-- Vin -->
    <path d="M22 18 Q32 15 42 18 Q40 26 32 30 Q24 26 22 18 Z"
          fill="url(#wine)"/>

    <!-- Glas (kupa) -->
    <path d="M20 8 Q32 4 44 8 Q46 22 32 30 Q18 22 20 8 Z"
          fill="url(#glass)" stroke="#888" stroke-width="1.5"/>

    <!-- Reflektion -->
    <path d="M36 10 Q42 14 40 24"
          fill="none" stroke="url(#highlight)" stroke-width="2"/>

    <!-- Stam -->
    <line x1="32" y1="30" x2="32" y2="48"
          stroke="#888" stroke-width="2"/>

    <!-- Fot -->
    <ellipse cx="32" cy="52" rx="10" ry="3"
             fill="#cfd6df" stroke="#888" stroke-width="1"/>

  </g>
</svg>
