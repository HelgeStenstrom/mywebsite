<h2>Viner vi känner till (WinesComponent)</h2>

<h2>Lägg till ett vin</h2>
<app-wine-entry></app-wine-entry>
<button (click)="addWineToList()" data-test="add-wine-button">Lägg till vinet enligt ovan</button>

<h2>Viner som finns i databasen</h2>

<table class="mat-table">
  <caption>Viner i databasen</caption>
  <th>ID</th>
  <th>Namn</th>
  <th>Land</th>
  <th>Typ</th>
  <th>Årgång</th>
  <th>Volym</th>
  <th>Datum</th>
  <th>Systembolaget</th>
  <tr *ngFor="let w of winesAsync$|async">
    <td>{{w.id}}</td>
    <td>{{w.name}}</td>
    <td>{{w.country}}</td>
    <td>{{w.wineType}}</td>
    <td>{{w.vintage}}</td>
    <td>{{w.volume}}</td>
    <td>{{w.createdAt| date:'yyyy-MM-dd'}}</td>
    <td *ngIf="w.systembolaget">
      <a
      href="https://www.systembolaget.se/sortiment/?q={{w.systembolaget}}"
      target="_blank"
      rel="noopener noreferrer">
        {{w.systembolaget}}
      </a>
    </td>
    <td *ngIf="!w.systembolaget"></td>

    <button mat-icon-button color="primary" (click)="edit(w)">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button
            color="warn"
            (click)="delete(w)"
            [disabled]="w.isUsed"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </tr>
</table>
