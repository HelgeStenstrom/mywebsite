<h2>Länder</h2>

<!-- Formulär för nytt land -->
<div>
  <input type="text" [(ngModel)]="newCountryName" placeholder="Nytt land" />
  <button (click)="addCountry()">Lägg till</button>
</div>

<table>
  <thead>
  <tr>
    <th>Namn</th>
    <th>Åtgärd</th>
  </tr>
  </thead>

  <tbody>
  <tr *ngFor="let country of countries">
    <td>{{ country.name }}</td>
    <td>
      <button
        (click)="deleteCountry(country.id)"
        [disabled]="country.isUsed"
      >
        Ta bort
      </button>
    </td>
  </tr>
  </tbody>

</table>

<p *ngIf="countries.length === 0">
  Inga länder hittades.
</p>
