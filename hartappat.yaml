openapi: "3.0.2"
info:
  title: Härtappat backend API
  version: "1.0"
servers:
  - url: '{protocol}://localhost:3000/api/v1'
    variables:
      protocol:
        enum:
          - http
        default: http
paths:
  /auth/login:
    post:
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: Log out
      responses:
        '204':
          description: Logout successful

  /auth/me:
    get:
      summary: Get current user
      responses:
        '200':
          description: Currently logged in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUser'
        '401':
          description: Not logged in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /countries:
    get:
      summary: Get a list of known countries.
      description: Returns a list of known countries in the database. Used to ensure that countries are spelled consistently.
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Country'
    post:
      summary: Adds one country to the list of known countries
      description: Adds one country to the list of known countries.
      requestBody:
        required: true
        description: One country to be added
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CountryCreate'
      responses:
        '201':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
  /countries/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the country
        required: true
        schema:
          type: integer
          format: int64
    delete:
      summary: Delete one country by id
      description: Delete one country which is not in use (not registered with any wine). Returns remaining countries.
      responses:
        '204':
          description: Successful deletion of the given country
        '409':
          description: Cannot delete the country as it is associated with wines.

  /grapes:
    get:
      description: Returns a list of the grapes in the database
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Grape'
    post:
      summary: Create a new grape
      description: Creates a new grape with the provided details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrapeCreate'
      responses:
        '201':
          description: Grape created successfully.  The response includes the ID of the newly created grape.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grape'

  /grapes/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the grape
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Returns a grape by id
      description: Returns a grape by id, with details
      responses:
        '404':
          description: Grape not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Successful GET operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grape'
    patch:
      summary: Change a grape identified by id
      description: Change the details of a grape, identified by its id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Grape'
      responses:
        '404':
          description: Grape not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Grape changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grape'
    delete:
      summary: Delete a grape by id
      description: Delete a grape by id
      responses:
        '204':
          description: Grape deleted successfully
        '404':
          description: Grape not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /members:
    get:
      description: Returns a list of the club members.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    given:
                      type: string
                      example: Helge
                    surname:
                      type: string
                      example: Stenström
    post:
      summary: Adds a new member to the club.
      requestBody:
        description: A member with properties in textual form
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreate'
      responses:
        '201':
          description: Member created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'

  /members/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the member
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Returns a member by id
      description: Returns a member by id, with details
      responses:
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Successful GET operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
    delete:
      summary: Delete a member by id
      description: Delete a member by id
      responses:
        '204':
          description: Member deleted successfully
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a member by id
      description: Update properties of a member identified by its id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberCreate'
      responses:
        '200':
          description: Member updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '404':
          description: Member not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tastings:
    get:
      description: Returns a list of all tastings
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WineTastingSummary'

    post:
      summary: Create a new tasting
      description: Adds a new tasting to the database
      requestBody:
        description: A tasting with properties in textual form
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineTastingCreate'
      responses:
        '201':
          description: Tasting created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineTasting'

  /tastings/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
    get:
      description: Returns information about one wine tasting
      responses:
        '200':
          description: Successful response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineTasting'
    delete:
      summary: Delete a wine tasting by id
      description: Removes a wine tasting from the database
      responses:
        '204':
          description: Tasting deleted successfully
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a tasting by id
      description: Update properties of a tasting identified by its id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineTastingCreate'
      responses:
        '200':
          description: Tasting updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineTasting'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /wines:
    get:
      description: Returns a list of the wines in the database. Currently, the length of the list is unlimited; that may change.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Wine'
    post:
      summary: Adds a wine to the database.
      requestBody:
        description: a wine with properties in textual form
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineCreate'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wine'

  /wines/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the wine
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Returns a wine by id
      description: Returns a wine by id, with details
      responses:
        '404':
          description: GET operation failed, wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '200':
          description: Successful GET operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wine'
    delete:
      summary: Deletes a wine from the database
      description: Deletes a wine by its ID, from the database
      responses:
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: Wine deleted successfully
    patch:
      summary: Update a wine by id
      description: Update properties of a wine identified by its id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineCreate'
      responses:
        '200':
          description: Wine updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wine'
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wines/{id}/grapes:
    parameters:
      - name: id
        in: path
        description: ID of the wine
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get all grapes for a wine
      description: Returns a list of grapes for a given wine
      responses:
        '200':
          description: Successful GET operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WineGrape'
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a grape to a wine
      description: Adds a grape to an existing wine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineGrapeCreate'
      responses:
        '201':
          description: Grape added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineGrape'
        '404':
          description: Wine not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wines/{id}/grapes/{wineGrapeId}:
    parameters:
      - name: id
        in: path
        description: ID of the wine
        required: true
        schema:
          type: integer
          format: int64
      - name: wineGrapeId
        in: path
        description: ID of the grape to delette
        required: true
        schema:
          type: integer
          format: int64
    delete:
      summary: Delete a grape from a wine
      description: Deletes a grape from an existing wine
      responses:
        '204':
          description: Grape deleted successfully from wine
        '404':
          description: Grape not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tastings/{id}/hosts:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get all hosts for a tasting
      description: Returns a list of hosts for a given tasting
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WineTastingHost'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a host to a tasting
      description: Adds a host to an existing tasting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineTastingHost'
      responses:
        '201':
          description: Host added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineTastingHost'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Replace all hosts for a tasting
      description: Deletes all existing hosts for the tasting and creates new ones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WineTastingHost'
      responses:
        '204':
          description: Hosts replaced successfully
        '400':
          description: Invalid tasting id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tastings/{id}/wines:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get all wines for a tasting
      description: Returns a list of wines for a given tasting
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WineTastingWine'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                  $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a wine to a tasting
      description: Adds a wine to an existing tasting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineTastingWineCreate'
      responses:
        '201':
          description: Wine added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineTastingWine'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tastings/{id}/wines/{tastingWineId}:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
      - name: tastingWineId
        in: path
        description: ID of the wine (in a tasting)
        required: true
        schema:
          type: integer
          format: int64
    delete:
      summary: Delete a wine from a tasting
      description: Deletes a wine from an existing tasting
      responses:
        '204':
          description: Wine deleted successfully from tasting
        '404':
          description: Wine not found in tasting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a wine in a tasting
      description: Updates properties of a wine in a tasting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineTastingWineUpdate'
      responses:
        '200':
          description: Wine updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineTastingWine'
        '404':
          description: Wine not found in tasting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tastings/{id}/wines/positions:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
    put:
      summary: Update positions for all wines in a tasting
      description: Updates the position of each wine in the tasting. Provide an array of tastingWineId and position pairs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WineTastingWinePositionUpdate'
      responses:
        '204':
          description: Positions updated successfully
        '400':
          description: Invalid tasting id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /tastings/{id}/scores:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
    get:
      summary: Get all scores for a tasting
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Score'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a score to a tasting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreCreate'
      responses:
        '201':
          description: Score created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Score'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Replace all scores for a tasting
      description: Deletes all existing scores for the tasting and creates new ones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ScoreCreate'
      responses:
        '200':
          description: Scores replaced successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Score'
        '404':
          description: Tasting not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'


  /tastings/{id}/scores/{scoreId}:
    parameters:
      - name: id
        in: path
        description: ID of the tasting
        required: true
        schema:
          type: integer
          format: int64
      - name: scoreId
        in: path
        description: ID of the score
        required: true
        schema:
          type: integer
          format: int64
    delete:
      summary: Delete a score from a tasting
      responses:
        '204':
          description: Score deleted successfully from tasting
        '404':
          description: Score not found in tasting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update a score in a tasting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreUpdate'
      responses:
        '200':
          description: Score updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Score'
        '404':
          description: Score not found in tasting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wine-types:
    post:
      summary: Create a new wine type
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WineTypeCreate'
      responses:
        '201':
          description: Wine type created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WineType'
    get:
      summary: Get all wine types
      responses:
        '200':
          description: Wine types returned successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WineType'

  /wine-types/{id}:
    parameters:
      - name: id
        in: path
        description: ID of the wine type
        required: true
        schema:
          type: integer
          format: int64
    delete:
      summary: Delete a wine type by id
      description: Delete a wine type which is not in use. Returns 409 if the wine type is associated with wines.
      responses:
        '204':
          description: Wine type deleted successfully
        '404':
          description: Wine type not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cannot delete the wine type as it is associated with wines.

components:
  schemas:
    Country:
      type: object
      required: [ id, name, isUsed ]
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Frankrike
        isUsed:
          type: boolean
          example: true

    CountryCreate:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          example: Frankrike

    Grape:
      type: object
      required: [ id, name, color, isUsed ]
      properties:
        id:
          type: integer
          description: Unique identifier for the grape
        name:
          description: The name of the grape.
          type: string
          example: Rondo
        color:
          $ref: '#/components/schemas/GrapeColor'
        isUsed:
          type: boolean
          description: True if the grape is used in one or more wines. If true, the grape cannot be deleted.
          example: false

    GrapeCreate:
      type: object
      required: [ name, color ]
      properties:
        name:
          type: string
          example: Rondo
        color:
          $ref: '#/components/schemas/GrapeColor'

    Member:
      type: object
      required: [ id, given, surname ]
      properties:
        id:
          type: integer
        given:
          type: string
          example: Helge
        surname:
          type: string
          example: Stenström

    MemberCreate:
      type: object
      required: [ given, surname ]
      properties:
        given:
          type: string
          example: Helge
        surname:
          type: string
          example: Stenström

    WineTastingSummary:
      type: object
      required: [ id, title, notes, tastingDate ]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: 'Röda viner från Danmark'
        notes:
          type: string
          example: 'Vi provade viner som vi drack i somras.'
        tastingDate:
          type: string
          format: date
          description: The date the tasting was taking place. In ISO notation.
          example: 2023-01-06
        wineTastingHosts:
          type: array
          items:
            $ref: '#/components/schemas/WineTastingHost'


    WineTasting:
      allOf:
        - $ref: '#/components/schemas/WineTastingSummary'
        - type: object
          properties:
            wines:
              type: array
              items:
                $ref: '#/components/schemas/WineTastingWine'


    WineTastingCreate:
      type: object
      required: [ title, notes, tastingDate ]
      properties:
        title:
          type: string
          example: 'Röda viner från Danmark'
        notes:
          type: string
          example: 'Vi provade viner som vi drack i somras. Det var jättetrevligt. Jag skriver mer senare.'
        tastingDate:
          type: string
          description: The date the tasting was taking place. In ISO notation.
          example: 2023-01-06

    WineTastingHost:
      type: object
      required: [ ]
      description: The host of the wine tasting. One of 'memberId' or 'name' must be set.
      properties:
        memberId:
          type: integer
          example: 1
          description: The ID of the host, if set.
        name:
          type: string
          example: "Robert Smith"
          description: The name of the host, if memberId is not set.

    WineTastingWine:
      type: object
      required: [ id, wineId, position ]
      properties:
        id:
          type: integer
        wineId:
          type: integer
        position:
          type: integer
          nullable: true
        purchasePrice:
          type: integer
          nullable: true
        averageScore:
          type: number
          format: float
          nullable: true
          description: >
            Average score for this position.
            Calculated dynamically from the scores table if scores exist.
            Falls back to the manually entered average_score from the database.
            Null if neither exists.
        scoreStdDev:
          type: number
          format: float
          nullable: true
          description: >
            Standard deviation of scores for this position.
            Calculated dynamically from the scores table if scores exist.
            Null if no scores exist in the scores table.

    WineTastingWineCreate:
      type: object
      required: [ wineId, position ]
      properties:
        wineId:
          type: integer
        position:
          type: integer
          nullable: true
        purchasePrice:
          type: integer
          nullable: true
        averageScore:
          type: number
          format: float
          nullable: true

    WineTastingWineUpdate:
      type: object
      properties:
        position:
          type: integer
        purchasePrice:
          type: integer
          nullable: true
        averageScore:
          type: number
          format: float
          nullable: true

    Wine:
      type: object
      description: >
        Exactly one of the following must apply:
        (1) vintageYear is set and isNonVintage is false,
        (2) isNonVintage is true and vintageYear is null/omitted,
        (3) both are null/false/omitted (vintage unknown).
      required:
        - id
        - name
        - country
        - wineType
        - isNonVintage
        - systembolaget
        - volume
        - createdAt
        - isUsed
      properties:
        id:
          type: integer
          example: 42
        name:
          type: string
          example: Liebfraumilch
        country:
          $ref: '#/components/schemas/Country'
        wineType:
          $ref: '#/components/schemas/WineType'
        grapes:
          type: array
          items:
            $ref: '#/components/schemas/WineGrape'
        vintageYear:
          type: integer
          nullable: true
          example: 2019
          description: >
            Vintage year. Mutually exclusive with isNonVintage=true.
            Omit or set to null if unknown or non-vintage.
        isNonVintage:
          type: boolean
          default: false
          example: false
          description: >
            Set to true if wine is non-vintage (NV).
            If true, vintageYear must be null or omitted.
        systembolaget:
          type: number
        volume:
          type: number
        createdAt:
          type: string
          format: date-time
          example: 2023-01-06T14:32:00Z
        isUsed:
          type: boolean
          description: >
            True if the wine is used in one or more tastings.
            If true, the wine cannot be deleted.


    WineCreate:
      type: object
      required: [ name, countryId, wineTypeId ]
      properties:
        name:
          type: string
          example: Liebfraumilch
        countryId:
          type: integer
          example: 7
        wineTypeId:
          type: integer
          example: 2

    WineType:
      type: object
      required: [ id, name, isUsed ]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Vitt
        isUsed:
          type: boolean
          example: true

    WineTypeCreate:
      type: object
      required: [ name ]
      properties:
        name:
          type: string
          example: Rött


    WineGrape:
      type: object
      required: [ id, grapeId ]
      properties:
        id:
          type: integer
        wineId:
          type: integer
        grapeId:
          type: integer
        percentage:
          type: number
          nullable: true

    WineGrapeCreate:
      type: object
      required: [ grapeId ]
      properties:
        grapeId:
          type: integer
        percentage:
          type: number
          nullable: true


    GrapeColor:
      description: The color of the grape, in Swedish.
      type: string
      enum: [ blå, grön, annan, okänd ]

    ScoreCreate:
      type: object
      required: [ memberId, position, score ]
      properties:
        memberId:
          type: integer
        position:
          type: integer
        score:
          type: number
          format: float

    ScoreUpdate:
      type: object
      properties:
        score:
          type: number
          format: float

    Score:
      allOf:
        - $ref: '#/components/schemas/ScoreCreate'
        - type: object
